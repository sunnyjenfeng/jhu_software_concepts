name: Module 6 CI

on:
  push:
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Module_6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/web/requirements.txt
          python -m pip install -r src/worker/requirements.txt
          python -m pip install -e .
          python -m pip install pylint

      - name: Run Pylint
        run: PYTHONPATH=src pylint src --fail-under=8

  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Module_6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/web/requirements.txt
          python -m pip install -r src/worker/requirements.txt
          python -m pip install -e .
          python -m pip
